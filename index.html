<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Công Việc Mới</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow-y: auto; }
        .app-bar { padding: 16px; background: #1976D2; color: white; font-size: 20px; font-weight: bold; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; }
        .back-btn { margin-right: 16px; text-decoration: none; color: white; font-size: 24px; }
        .content { padding: 24px; }
        .input-group { margin-bottom: 16px; position: relative; }
        .input-group input, .input-group textarea, .input-group select { width: 100%; padding: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; font-family: inherit; background: white; }
        .input-icon { position: absolute; right: 16px; top: 16px; color: #1976D2; pointer-events: none; }
        
        .list-tile { border: 1px solid #ccc; border-radius: 8px; padding: 12px 16px; display: flex; align-items: center; cursor: pointer; margin-bottom: 32px; }
        .list-tile-icon { color: #1976D2; font-size: 24px; margin-right: 16px; }
        .list-tile-content { flex: 1; }
        .list-tile-title { font-size: 16px; color: #333; }
        .list-tile-subtitle { font-size: 14px; color: #666; margin-top: 4px; }
        .list-tile-trailing { color: #666; }

        .btn-primary { width: 100%; padding: 16px; background-color: #1976D2; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; height: 50px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-bar">
            <a href="#" class="back-btn">&#8592;</a>
            Thêm Công Việc Mới
        </div>
        <div class="content">
            <div class="input-group">
                <input type="text" placeholder="Tên Task *">
            </div>
            <div class="input-group">
                <textarea rows="3" placeholder="Mô tả chi tiết"></textarea>
            </div>
            <div class="input-group">
                <input type="date" placeholder="Hạn chót (Deadline)">
            </div>
            <div class="input-group">
                <select>
                    <option value="Low">Low</option>
                    <option value="Medium" selected>Medium</option>
                    <option value="High">High</option>
                </select>
            </div>
            
            <div class="list-tile">
                <div class="list-tile-icon">&#128101;</div> <div class="list-tile-content">
                    <div class="list-tile-title">Người thực hiện</div>
                    <div class="list-tile-subtitle">Chưa phân công</div>
                </div>
                <div class="list-tile-trailing">&#9998;</div> </div>

            <button class="btn-primary">Thêm Task</button>
        </div>
    </div>
</body>
</html>
