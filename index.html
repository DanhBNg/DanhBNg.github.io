<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - TaskHub AI</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 400px; background: white; padding: 24px; display: flex; flex-direction: column; justify-content: center; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        .title { font-size: 32px; font-weight: bold; color: #448AFF; text-align: center; margin-bottom: 40px; margin-top: 0; }
        .input-group { margin-bottom: 16px; }
        .input-group input { width: 100%; padding: 16px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn-primary { width: 100%; padding: 16px; background-color: #1976D2; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; margin-top: 8px; }
        .btn-text { width: 100%; padding: 16px; background: none; color: #1976D2; border: none; font-size: 14px; cursor: pointer; margin-top: 8px; text-decoration: none; text-align: center; display: block; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 class="title">TaskHub AI</h1>
        
        <div class="input-group">
            <input type="email" placeholder="Email">
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="Mật khẩu">
        </div>
        
        <button class="btn-primary">Đăng Nhập</button>
        <a href="#" class="btn-text">Chưa có tài khoản? Đăng ký ngay</a>
    </div>
</body>
</html>
